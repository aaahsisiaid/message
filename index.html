<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FlashCam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --panel: #0f0f18;
  --border: #1e1e2e;
  --accent: #7fffb2;
  --accent2: #ff7f50;
  --accent3: #7fb8ff;
  --text: #c8c8d8;
  --dim: #555566;
  --font: 'Space Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Titlebar ── */
.titlebar {
  height: 28px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 6px;
  flex-shrink: 0; position: relative;
}
.traffic { width: 11px; height: 11px; border-radius: 50%; }
.t-red { background: #ff5f56; }
.t-yel { background: #ffbd2e; }
.t-grn { background: #27c93f; }
.titlebar-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  color: var(--dim); font-size: 11px; letter-spacing: .08em;
}

/* ── Main grid ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: 1fr 96px;
  overflow: hidden;
}

/* ── Camera area ── */
.cam-area {
  grid-column: 1; grid-row: 1;
  position: relative;
  background: #000;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#video { width: 100%; height: 100%; object-fit: cover; display: none; }
.cam-overlay {
  position: absolute; inset: 0; pointer-events: none; display: none;
}
.cam-overlay::before, .cam-overlay::after {
  content: ''; position: absolute;
  width: 44px; height: 44px;
  border-color: var(--accent); border-style: solid; opacity: .45;
}
.cam-overlay::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
.cam-overlay::after  { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

.cam-placeholder {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px; color: var(--dim);
}
.cam-placeholder svg { opacity: .2; }
.cam-placeholder span { font-size: 11px; letter-spacing: .12em; }

.flash-indicator {
  position: absolute; inset: 0; background: #fff;
  opacity: 0; pointer-events: none; transition: opacity .04s;
}
.flash-indicator.on { opacity: .15; }

.cam-status {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,15,.88);
  border: 1px solid var(--border);
  padding: 3px 14px; font-size: 10px;
  letter-spacing: .08em; color: var(--dim); white-space: nowrap;
}
.cam-status.live { color: var(--accent); border-color: var(--accent); }
.cam-status.live::before { content: 'REC  '; animation: blink .8s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.shutter-flash {
  position: absolute; inset: 0; background: #fff;
  opacity: 0; pointer-events: none;
}
.shutter-flash.snap { animation: shutter .22s ease-out forwards; }
@keyframes shutter { 0%{opacity:.9} 100%{opacity:0} }

.flash-ring {
  position: absolute; width: 72px; height: 72px;
  border-radius: 50%; border: 2px solid var(--accent);
  opacity: 0; pointer-events: none;
}
.flash-ring.pulse { animation: ring .35s ease-out forwards; }
@keyframes ring { 0%{opacity:.9;transform:scale(.7)} 100%{opacity:0;transform:scale(2.3)} }

canvas { display: none; }

/* ── Gallery strip ── */
.gallery-area {
  grid-column: 1; grid-row: 2;
  background: #080810;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  overflow: hidden; position: relative;
}
.gallery-empty {
  width: 100%; text-align: center;
  font-size: 10px; color: var(--dim); letter-spacing: .1em;
}
.gallery-scroll {
  display: flex; align-items: center;
  gap: 5px; padding: 8px 10px;
  overflow-x: auto; flex: 1; height: 100%;
  scroll-behavior: smooth;
}
.gallery-scroll::-webkit-scrollbar { height: 2px; }
.gallery-scroll::-webkit-scrollbar-thumb { background: var(--border); }

/* ── Burst group ── */
.burst-group {
  position: relative; flex-shrink: 0;
  width: 64px; height: 72px;
  cursor: pointer;
}
/* stacked shadow cards */
.burst-group::before, .burst-group::after {
  content: '';
  position: absolute;
  border: 1px solid var(--border);
  background: #12121e;
  transition: border-color .15s;
}
.burst-group.multi::before {
  width: 56px; height: 64px;
  bottom: 4px; left: 4px;
}
.burst-group.multi::after {
  width: 58px; height: 66px;
  bottom: 2px; left: 2px;
}
.burst-group:hover::before,
.burst-group:hover::after { border-color: var(--accent); }

.burst-thumb {
  position: absolute;
  bottom: 0; left: 0;
  width: 60px; height: 68px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.burst-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.burst-group:hover .burst-thumb,
.burst-group.selected .burst-thumb {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.burst-count {
  position: absolute; top: 2px; right: 2px;
  background: rgba(10,10,15,.82);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 8px; padding: 1px 4px;
  letter-spacing: .04em;
}
.burst-index {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.65);
  font-size: 8px; color: var(--dim);
  text-align: center; padding: 2px 0;
}
.burst-group.selected .burst-index { color: var(--accent); }

/* expanded burst overlay */
.burst-expand {
  display: none;
  position: absolute; inset: 0;
  background: rgba(5,5,12,.92);
  z-index: 10;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
}
.burst-expand.show { display: flex; }
.burst-expand-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.burst-expand-title { font-size: 10px; color: var(--accent); letter-spacing: .08em; }
.burst-expand-close {
  background: none; border: 1px solid var(--border);
  color: var(--dim); font-family: var(--font); font-size: 10px;
  padding: 2px 8px; cursor: pointer;
}
.burst-expand-close:hover { border-color: var(--accent2); color: var(--accent2); }
.burst-expand-scroll {
  display: flex; gap: 6px;
  overflow-x: auto; flex: 1; align-items: center;
}
.burst-expand-scroll::-webkit-scrollbar { height: 2px; }
.burst-expand-scroll::-webkit-scrollbar-thumb { background: var(--border); }
.expand-thumb {
  position: relative; flex-shrink: 0;
  width: 60px; height: 68px;
  border: 1px solid var(--border);
  cursor: pointer; overflow: hidden;
  transition: border-color .15s;
}
.expand-thumb:hover { border-color: var(--accent); }
.expand-thumb.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.expand-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.expand-num {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.65);
  font-size: 8px; color: var(--dim);
  text-align: center; padding: 2px 0;
}
.expand-thumb.selected .expand-num { color: var(--accent); }

/* ── Sidebar ── */
.sidebar {
  grid-column: 2; grid-row: 1 / 3;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); }

.section { border-bottom: 1px solid var(--border); padding: 12px 14px; }
.section-title {
  font-size: 9px; letter-spacing: .15em;
  color: var(--dim); text-transform: uppercase; margin-bottom: 10px;
}

.control-row {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 8px;
}
.control-label { font-size: 11px; color: var(--text); }
.control-label small { display: block; color: var(--dim); font-size: 8px; margin-top: 1px; }

/* ── Big number stepper ── */
.stepper {
  display: flex; align-items: stretch;
  border: 1px solid var(--border);
  height: 40px;
}
.step-btn {
  background: none; border: none;
  color: var(--accent);
  width: 40px;
  cursor: pointer;
  font-family: var(--font); font-size: 20px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.step-btn:hover  { background: rgba(127,255,178,.12); }
.step-btn:active { background: rgba(127,255,178,.25); }
.step-val {
  background: rgba(0,0,0,.5);
  color: var(--accent);
  font-size: 13px; font-family: var(--font);
  width: 54px; text-align: center;
  display: flex; align-items: center; justify-content: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.step-unit {
  font-size: 8px; color: var(--dim);
  display: flex; align-items: center;
  padding: 0 6px; border-left: 1px solid var(--border);
  white-space: nowrap; min-width: 28px;
}

/* ── Buttons ── */
.btn {
  width: 100%; padding: 10px 0;
  border: 1px solid var(--border);
  background: none; color: var(--text);
  font-family: var(--font); font-size: 11px;
  letter-spacing: .1em; cursor: pointer;
  transition: background .14s, border-color .14s, color .14s;
  text-transform: uppercase;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { background: rgba(255,255,255,.04); border-color: #2a2a3a; }
.btn:active { background: rgba(255,255,255,.09); }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover  { background: rgba(127,255,178,.08); }
.btn.primary:active { background: rgba(127,255,178,.18); }
.btn.primary.active { background: var(--accent); color: #0a0a0f; }
.btn.warn { border-color: var(--accent2); color: var(--accent2); }
.btn.warn:hover { background: rgba(255,127,80,.08); }
.btn + .btn { margin-top: 6px; }
.btn:disabled { opacity: .28; pointer-events: none; }

/* ── Log ── */
.log {
  min-height: 40px; max-height: 110px;
  overflow-y: auto; padding: 6px 8px;
  background: rgba(0,0,0,.4); border: 1px solid var(--border);
  font-size: 9px; line-height: 1.7; color: var(--dim);
  display: flex; flex-direction: column-reverse;
}
.log::-webkit-scrollbar { width: 2px; }
.log-entry { white-space: pre-wrap; word-break: break-all; }
.log-entry.ok   { color: var(--accent); }
.log-entry.err  { color: var(--accent2); }
.log-entry.info { color: var(--accent3); }

/* ── Stats ── */
.stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 4px; padding: 10px 14px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.stat { text-align: center; }
.stat-val { font-size: 17px; color: var(--accent); display: block; font-weight: 700; }
.stat-lbl { font-size: 8px; color: var(--dim); letter-spacing: .08em; text-transform: uppercase; }

/* ── ZIP progress ── */
.zip-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.8); z-index: 100;
  align-items: center; justify-content: center;
}
.zip-overlay.show { display: flex; }
.zip-box {
  background: var(--panel); border: 1px solid var(--accent);
  padding: 24px 36px; text-align: center; min-width: 220px;
}
.zip-box p { font-size: 11px; color: var(--accent); letter-spacing: .08em; margin-bottom: 12px; }
.zip-track { height: 2px; background: var(--border); }
.zip-fill  { height: 100%; background: var(--accent); width: 0; transition: width .1s; }

@media (max-width: 600px) {
  .main {
    grid-template-columns: 1fr;
    grid-template-rows: 48vw 88px 1fr;
  }
  .cam-area    { grid-column: 1; grid-row: 1; }
  .gallery-area{ grid-column: 1; grid-row: 2; }
  .sidebar     { grid-column: 1; grid-row: 3; }
}
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic t-red"></div>
  <div class="traffic t-yel"></div>
  <div class="traffic t-grn"></div>
  <span class="titlebar-title">FlashCam.html</span>
</div>

<div class="main">

  <!-- Camera -->
  <div class="cam-area">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-placeholder" id="placeholder">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <rect x="8" y="18" width="56" height="40" rx="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="36" cy="38" r="12" stroke="currentColor" stroke-width="2"/>
        <circle cx="36" cy="38" r="5" fill="currentColor" opacity=".3"/>
        <path d="M24 18l4-8h16l4 8" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="56" cy="26" r="3" fill="currentColor" opacity=".4"/>
      </svg>
      <span>START CAMERA</span>
    </div>
    <div class="cam-overlay" id="camOverlay"></div>
    <div class="flash-indicator" id="flashIndicator"></div>
    <div class="shutter-flash" id="shutterFlash"></div>
    <div class="flash-ring" id="flashRing"></div>
    <div class="cam-status" id="camStatus">OFFLINE</div>
  </div>

  <!-- Gallery -->
  <div class="gallery-area" id="galleryArea">
    <div class="gallery-empty" id="galleryEmpty">NO PHOTOS YET</div>
    <div class="gallery-scroll" id="galleryScroll" style="display:none"></div>
    <!-- burst expand overlay -->
    <div class="burst-expand" id="burstExpand">
      <div class="burst-expand-header">
        <span class="burst-expand-title" id="burstExpandTitle">BURST #1</span>
        <button class="burst-expand-close" onclick="closeBurstExpand()">&#x2715; CLOSE</button>
      </div>
      <div class="burst-expand-scroll" id="burstExpandScroll"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="section">
      <div class="section-title">Camera</div>
      <button class="btn primary" id="btnCamera" onclick="toggleCamera()">&#9654; START CAMERA</button>
    </div>

    <div class="section">
      <div class="section-title">Flashlight</div>
      <div class="control-row">
        <div class="control-label">点滅間隔<small>blink interval</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="adj('flashInterval',-0.05)">-</button>
          <div class="step-val" id="flashInterval-val">0.05</div>
          <button class="step-btn" onclick="adj('flashInterval',0.05)">+</button>
          <div class="step-unit">sec</div>
        </div>
      </div>
      <div class="control-row">
        <div class="control-label">点灯時間<small>on duration</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="adj('flashDuration',-0.01)">-</button>
          <div class="step-val" id="flashDuration-val">0.01</div>
          <button class="step-btn" onclick="adj('flashDuration',0.01)">+</button>
          <div class="step-unit">sec</div>
        </div>
      </div>
      <button class="btn primary" id="btnFlash" onclick="toggleFlash()">&#9889; START FLASH</button>
    </div>

    <div class="section">
      <div class="section-title">Auto Capture</div>
      <div class="control-row">
        <div class="control-label">撮影間隔<small>capture interval</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="adj('photoInterval',-0.1)">-</button>
          <div class="step-val" id="photoInterval-val">0.1</div>
          <button class="step-btn" onclick="adj('photoInterval',0.1)">+</button>
          <div class="step-unit">sec</div>
        </div>
      </div>
      <div class="control-row">
        <div class="control-label">最大枚数<small>max  0=unlimited</small></div>
        <div class="stepper">
          <button class="step-btn" onclick="adj('maxShots',-1)">-</button>
          <div class="step-val" id="maxShots-val">0</div>
          <button class="step-btn" onclick="adj('maxShots',1)">+</button>
          <div class="step-unit">pcs</div>
        </div>
      </div>
      <button class="btn primary" id="btnPhoto" onclick="togglePhoto()">&#9711; START CAPTURE</button>
      <button class="btn" onclick="snapNow()" style="margin-top:6px">SNAP NOW</button>
    </div>

    <div class="section">
      <div class="section-title">Download</div>
      <button class="btn primary" id="btnDlAll" onclick="downloadAll()" disabled>&#8659; DOWNLOAD ALL (ZIP)</button>
      <button class="btn" id="btnDlSel" onclick="downloadSelected()" disabled>&#8659; DOWNLOAD SELECTED</button>
      <button class="btn warn" id="btnClear" onclick="clearPhotos()" disabled>&#10005; CLEAR ALL</button>
    </div>

    <div class="section" style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div class="section-title">Log</div>
      <div class="log" id="log"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-val" id="statFlash">0</span>
        <span class="stat-lbl">Flashes</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="statPhoto">0</span>
        <span class="stat-lbl">Photos</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="statTime">--</span>
        <span class="stat-lbl">Uptime</span>
      </div>
    </div>

  </div>
</div>

<!-- ZIP progress -->
<div class="zip-overlay" id="zipOverlay">
  <div class="zip-box">
    <p id="zipMsg">BUILDING ZIP...</p>
    <div class="zip-track"><div class="zip-fill" id="zipFill"></div></div>
  </div>
</div>

<script>
// ── Config (all defaults = minimum) ──────────────────────
const S = {
  flashInterval: 0.05,
  flashDuration: 0.01,
  photoInterval: 0.1,
  maxShots:      0,
};
const BOUNDS = {
  flashInterval: { min: 0.05, max: 120,  step: 0.05, dec: 2 },
  flashDuration: { min: 0.01, max: 10,   step: 0.01, dec: 2 },
  photoInterval: { min: 0.1,  max: 3600, step: 0.1,  dec: 1 },
  maxShots:      { min: 0,    max: 9999, step: 1,    dec: 0 },
};

// ── State ────────────────────────────────────────────────
let stream = null, track = null, hasTorch = false;
let flashTimer = null, flashOffTimer = null, photoTimer = null;
let flashCount = 0, photoCount = 0;
let startTime = null, uptimeTimer = null;
let cameraActive = false, flashActive = false, photoActive = false;

// photos: [{blob, filename, url, burstId}]
const photos = [];
// bursts: [{id, photos:[idx...], el, expandEls:[]}]
const bursts = [];
let lastBurstTime = 0;
const BURST_GAP_MS = 3000; // photos within 3s → same burst
let expandedBurst = -1; // burst index currently expanded

// selected photo indices (across all bursts)
const selectedPhotos = new Set();

// ── Logger ───────────────────────────────────────────────
function log(msg, type = 'ok') {
  const el = document.getElementById('log');
  const t = new Date().toTimeString().slice(0, 8);
  const d = document.createElement('div');
  d.className = 'log-entry ' + type;
  d.textContent = '[' + t + '] ' + msg;
  el.prepend(d);
  if (el.children.length > 100) el.lastChild.remove();
}

// ── Number stepper ───────────────────────────────────────
function adj(key, rawDelta) {
  const b = BOUNDS[key];
  // use fixed-point arithmetic to avoid float drift
  const scale = Math.pow(10, b.dec);
  const cur   = Math.round(S[key] * scale);
  const delta = Math.round(rawDelta * scale);
  let next = Math.max(Math.round(b.min * scale), Math.min(Math.round(b.max * scale), cur + delta));
  S[key] = next / scale;
  document.getElementById(key + '-val').textContent = S[key].toFixed(b.dec);
}

// ── Camera ───────────────────────────────────────────────
async function toggleCamera() {
  cameraActive ? stopCamera() : await startCamera();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const v = document.getElementById('video');
    v.srcObject = stream; v.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('camOverlay').style.display = 'block';

    track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    hasTorch = !!(caps && caps.torch);
    cameraActive = true;
    startTime = Date.now();
    uptimeTimer = setInterval(updateUptime, 1000);

    document.getElementById('btnCamera').textContent = '| STOP CAMERA';
    document.getElementById('btnCamera').classList.add('active');
    const st = document.getElementById('camStatus');
    st.textContent = hasTorch ? 'TORCH READY' : 'NO TORCH API';
    st.className = 'cam-status live';
    log('Camera started  torch:' + (hasTorch ? 'yes' : 'no'), 'ok');
  } catch(e) {
    log('Camera error: ' + e.message, 'err');
  }
}

function stopCamera() {
  stopFlash(); stopPhoto();
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; track = null;
  const v = document.getElementById('video');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('camOverlay').style.display = 'none';
  clearInterval(uptimeTimer); uptimeTimer = null;
  cameraActive = false;
  document.getElementById('btnCamera').innerHTML = '&#9654; START CAMERA';
  document.getElementById('btnCamera').classList.remove('active');
  document.getElementById('camStatus').textContent = 'OFFLINE';
  document.getElementById('camStatus').className = 'cam-status';
  document.getElementById('statTime').textContent = '--';
  log('Camera stopped', 'info');
}

function updateUptime() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + String(s % 60).padStart(2, '0');
}

// ── Flash ────────────────────────────────────────────────
function toggleFlash() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  flashActive ? stopFlash() : startFlash();
}
function startFlash() {
  flashActive = true;
  document.getElementById('btnFlash').textContent = '| STOP FLASH';
  document.getElementById('btnFlash').classList.add('active');
  log('Flash  interval:' + S.flashInterval + 's  on:' + S.flashDuration + 's', 'ok');
  doFlash();
}
function doFlash() {
  if (!flashActive) return;
  flashTimer = setTimeout(() => { triggerFlash(); doFlash(); }, S.flashInterval * 1000);
}
async function triggerFlash() {
  flashCount++;
  document.getElementById('statFlash').textContent = flashCount;
  const ind = document.getElementById('flashIndicator');
  ind.classList.add('on');
  const ring = document.getElementById('flashRing');
  ring.classList.remove('pulse'); void ring.offsetWidth; ring.classList.add('pulse');
  if (hasTorch && track) {
    try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(_) {}
  }
  flashOffTimer = setTimeout(async () => {
    ind.classList.remove('on');
    if (hasTorch && track) {
      try { await track.applyConstraints({ advanced: [{ torch: false }] }); } catch(_) {}
    }
  }, S.flashDuration * 1000);
}
function stopFlash() {
  flashActive = false;
  clearTimeout(flashTimer); clearTimeout(flashOffTimer);
  if (hasTorch && track) track.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
  document.getElementById('flashIndicator').classList.remove('on');
  document.getElementById('btnFlash').innerHTML = '&#9889; START FLASH';
  document.getElementById('btnFlash').classList.remove('active');
  log('Flash stopped', 'info');
}

// ── Photo capture ────────────────────────────────────────
function togglePhoto() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  photoActive ? stopPhoto() : startPhoto();
}
function startPhoto() {
  photoActive = true;
  document.getElementById('btnPhoto').textContent = '| STOP CAPTURE';
  document.getElementById('btnPhoto').classList.add('active');
  log('Capture start  every ' + S.photoInterval + 's', 'ok');
  schedulePhoto();
}
function schedulePhoto() {
  if (!photoActive) return;
  photoTimer = setTimeout(() => {
    if (!photoActive) return;
    snapNow();
    if (S.maxShots > 0 && photoCount >= S.maxShots) {
      stopPhoto(); log('Max shots reached', 'info'); return;
    }
    schedulePhoto();
  }, S.photoInterval * 1000);
}
function stopPhoto() {
  photoActive = false; clearTimeout(photoTimer);
  document.getElementById('btnPhoto').innerHTML = '&#9711; START CAPTURE';
  document.getElementById('btnPhoto').classList.remove('active');
  log('Capture stopped', 'info');
}

function shutterFx() {
  const sf = document.getElementById('shutterFlash');
  sf.classList.remove('snap'); void sf.offsetWidth; sf.classList.add('snap');
}

async function snapNow() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  shutterFx();
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const fn = 'photo_' + ts + '.jpg';
  if (window.ImageCapture && track) {
    try {
      const blob = await new ImageCapture(track).takePhoto();
      addPhoto(blob, fn); return;
    } catch(_) { log('ImageCapture fallback', 'info'); }
  }
  const v = document.getElementById('video');
  const c = document.getElementById('canvas');
  c.width = v.videoWidth || 1280; c.height = v.videoHeight || 720;
  c.getContext('2d').drawImage(v, 0, 0);
  c.toBlob(blob => addPhoto(blob, fn), 'image/jpeg', 0.93);
}

// ── Gallery / Burst ──────────────────────────────────────
function addPhoto(blob, filename) {
  const now = Date.now();
  const url = URL.createObjectURL(blob);
  const photoIdx = photos.length;
  photos.push({ blob, filename, url });
  photoCount++;
  document.getElementById('statPhoto').textContent = photoCount;
  log('Photo #' + photoCount + '  ' + filename, 'ok');

  // decide burst
  const isSameBurst = bursts.length > 0 && (now - lastBurstTime) < BURST_GAP_MS;
  lastBurstTime = now;

  const scroll = document.getElementById('galleryScroll');
  document.getElementById('galleryEmpty').style.display = 'none';
  scroll.style.display = 'flex';

  if (isSameBurst) {
    // append to last burst
    const burst = bursts[bursts.length - 1];
    burst.photos.push(photoIdx);
    updateBurstEl(burst, url, photoIdx);
  } else {
    // new burst
    const burstIdx = bursts.length;
    const burst = { id: burstIdx, photos: [photoIdx] };
    bursts.push(burst);
    burst.el = createBurstEl(burst, url, photoIdx, burstIdx);
    scroll.appendChild(burst.el);
    scroll.scrollLeft = scroll.scrollWidth;
  }

  updateDlBtns();
}

function createBurstEl(burst, url, photoIdx, burstIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'burst-group';
  wrap.dataset.burstIdx = burstIdx;
  wrap.onclick = () => onBurstClick(burstIdx);

  const thumb = document.createElement('div');
  thumb.className = 'burst-thumb';
  const img = document.createElement('img');
  img.src = url; img.alt = 'burst';
  thumb.appendChild(img);

  const countBadge = document.createElement('div');
  countBadge.className = 'burst-count';
  countBadge.style.display = 'none';

  const idxLabel = document.createElement('div');
  idxLabel.className = 'burst-index';
  idxLabel.textContent = '#' + photoIdx;

  wrap.appendChild(thumb);
  wrap.appendChild(countBadge);
  wrap.appendChild(idxLabel);
  burst.thumbEl    = thumb;
  burst.imgEl      = img;
  burst.countEl    = countBadge;
  burst.idxEl      = idxLabel;
  return wrap;
}

function updateBurstEl(burst, url, photoIdx) {
  // update cover to latest
  burst.imgEl.src = url;
  burst.idxEl.textContent = '#' + (burst.photos[0]) + '-' + photoIdx;
  // show multi-stack style + count badge
  burst.el.classList.add('multi');
  burst.countEl.style.display = 'block';
  burst.countEl.textContent = burst.photos.length;
}

function onBurstClick(burstIdx) {
  const burst = bursts[burstIdx];
  if (burst.photos.length === 1) {
    // single photo: toggle select
    const pIdx = burst.photos[0];
    if (selectedPhotos.has(pIdx)) {
      selectedPhotos.delete(pIdx);
      burst.el.classList.remove('selected');
    } else {
      selectedPhotos.add(pIdx);
      burst.el.classList.add('selected');
    }
    updateDlBtns();
  } else {
    openBurstExpand(burstIdx);
  }
}

function openBurstExpand(burstIdx) {
  expandedBurst = burstIdx;
  const burst = bursts[burstIdx];
  document.getElementById('burstExpandTitle').textContent = 'BURST  ' + burst.photos.length + ' PHOTOS';
  const sc = document.getElementById('burstExpandScroll');
  sc.innerHTML = '';
  burst.photos.forEach((pIdx, i) => {
    const p = photos[pIdx];
    const wrap = document.createElement('div');
    wrap.className = 'expand-thumb' + (selectedPhotos.has(pIdx) ? ' selected' : '');
    wrap.dataset.pIdx = pIdx;
    wrap.onclick = () => toggleExpandThumb(pIdx, wrap);
    const img = document.createElement('img');
    img.src = p.url; img.alt = p.filename;
    const num = document.createElement('div');
    num.className = 'expand-num';
    num.textContent = '#' + (i + 1);
    wrap.appendChild(img); wrap.appendChild(num);
    sc.appendChild(wrap);
  });
  document.getElementById('burstExpand').classList.add('show');
}

function toggleExpandThumb(pIdx, el) {
  if (selectedPhotos.has(pIdx)) {
    selectedPhotos.delete(pIdx);
    el.classList.remove('selected');
  } else {
    selectedPhotos.add(pIdx);
    el.classList.add('selected');
  }
  // sync burst-group selection style
  const burst = bursts[expandedBurst];
  const allSel = burst.photos.every(i => selectedPhotos.has(i));
  burst.el.classList.toggle('selected', allSel);
  updateDlBtns();
}

function closeBurstExpand() {
  document.getElementById('burstExpand').classList.remove('show');
  expandedBurst = -1;
}

function updateDlBtns() {
  const has = photos.length > 0;
  const sel = selectedPhotos.size > 0;
  document.getElementById('btnDlAll').disabled = !has;
  document.getElementById('btnDlSel').disabled = !sel;
  document.getElementById('btnClear').disabled = !has;
}

// ── Download ─────────────────────────────────────────────
function dlBlob(blob, name) {
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(u);
}

function downloadSelected() {
  const list = [...selectedPhotos].map(i => photos[i]);
  if (!list.length) return;
  if (list.length === 1) { dlBlob(list[0].blob, list[0].filename); log('Downloaded 1 photo', 'ok'); return; }
  buildZip(list, 'flashcam_selected.zip');
}

function downloadAll() {
  if (!photos.length) return;
  if (photos.length === 1) { dlBlob(photos[0].blob, photos[0].filename); log('Downloaded 1 photo', 'ok'); return; }
  buildZip(photos, 'flashcam_all.zip');
}

async function buildZip(list, zipName) {
  const overlay = document.getElementById('zipOverlay');
  const fill    = document.getElementById('zipFill');
  const msg     = document.getElementById('zipMsg');
  overlay.classList.add('show'); fill.style.width = '0%';
  try {
    const zip = new JSZip();
    for (let i = 0; i < list.length; i++) {
      zip.file(list[i].filename, list[i].blob);
      fill.style.width = Math.round((i + 1) / list.length * 55) + '%';
      msg.textContent  = 'PACKING... ' + (i + 1) + ' / ' + list.length;
      await new Promise(r => setTimeout(r, 0));
    }
    msg.textContent = 'COMPRESSING...';
    const blob = await zip.generateAsync(
      { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 3 } },
      m => { fill.style.width = (55 + Math.round(m.percent * 0.45)) + '%'; }
    );
    fill.style.width = '100%'; msg.textContent = 'DONE!';
    await new Promise(r => setTimeout(r, 350));
    dlBlob(blob, zipName);
    log('ZIP: ' + zipName + ' (' + list.length + ' photos)', 'ok');
  } catch(e) {
    log('ZIP error: ' + e.message, 'err');
  } finally {
    overlay.classList.remove('show');
  }
}

function clearPhotos() {
  closeBurstExpand();
  photos.forEach(p => URL.revokeObjectURL(p.url));
  photos.length = 0; bursts.length = 0;
  selectedPhotos.clear();
  photoCount = 0; lastBurstTime = 0;
  document.getElementById('statPhoto').textContent = '0';
  document.getElementById('galleryScroll').innerHTML = '';
  document.getElementById('galleryScroll').style.display = 'none';
  document.getElementById('galleryEmpty').style.display = 'block';
  updateDlBtns();
  log('All photos cleared', 'info');
}

log('FlashCam ready', 'info');
</script>
