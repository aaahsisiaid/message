<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FlashCam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #0f0f18;
    --border: #1e1e2e;
    --accent: #7fffb2;
    --accent2: #ff7f50;
    --accent3: #7fb8ff;
    --text: #c8c8d8;
    --dim: #555566;
    --font: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Titlebar ── */
  .titlebar {
    height: 28px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 6px;
    flex-shrink: 0; position: relative;
  }
  .traffic { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; transition: opacity .2s; }
  .traffic:hover { opacity: .7; }
  .t-red { background: #ff5f56; }
  .t-yel { background: #ffbd2e; }
  .t-grn { background: #27c93f; }
  .titlebar-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    color: var(--dim); font-size: 11px; letter-spacing: .08em;
  }

  /* ── Layout ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  /* ── Camera ── */
  .cam-area {
    grid-column: 1; grid-row: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: none; }
  .cam-overlay {
    position: absolute; inset: 0; pointer-events: none; display: none;
  }
  .cam-overlay::before, .cam-overlay::after {
    content: ''; position: absolute;
    width: 40px; height: 40px;
    border-color: var(--accent); border-style: solid; opacity: .5;
  }
  .cam-overlay::before { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .cam-overlay::after  { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  .cam-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px; color: var(--dim);
  }
  .cam-placeholder svg { opacity: .25; }
  .cam-placeholder span { font-size: 11px; letter-spacing: .1em; }

  .flash-indicator {
    position: absolute; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; transition: opacity .05s;
  }
  .flash-indicator.on { opacity: .14; }

  .cam-status {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,15,.85);
    border: 1px solid var(--border);
    padding: 3px 12px; font-size: 10px;
    letter-spacing: .08em; color: var(--dim); white-space: nowrap;
  }
  .cam-status.live { color: var(--accent); border-color: var(--accent); }
  .cam-status.live::before { content: 'REC '; animation: blink-dot .8s step-end infinite; }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0} }

  .shutter-flash {
    position: absolute; inset: 0; background: #fff;
    opacity: 0; pointer-events: none;
  }
  .shutter-flash.snap { animation: shutter .25s ease-out forwards; }
  @keyframes shutter { 0%{opacity:.85} 100%{opacity:0} }

  .flash-ring {
    position: absolute; width: 72px; height: 72px;
    border-radius: 50%; border: 2px solid var(--accent);
    opacity: 0; pointer-events: none;
  }
  .flash-ring.pulse { animation: ring-pulse .35s ease-out forwards; }
  @keyframes ring-pulse {
    0%  { opacity: .9; transform: scale(.7); }
    100%{ opacity: 0;  transform: scale(2.2); }
  }

  canvas { display: none; }

  /* ── Gallery strip ── */
  .gallery-area {
    grid-column: 1; grid-row: 2;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    gap: 0; height: 80px;
    overflow: hidden;
  }
  .gallery-empty {
    width: 100%; text-align: center;
    font-size: 10px; color: var(--dim); letter-spacing: .08em;
  }
  .gallery-scroll {
    display: flex; align-items: center;
    gap: 4px; padding: 6px 8px;
    overflow-x: auto; flex: 1; height: 100%;
  }
  .gallery-scroll::-webkit-scrollbar { height: 3px; }
  .gallery-scroll::-webkit-scrollbar-thumb { background: var(--border); }
  .thumb-wrap {
    position: relative; flex-shrink: 0;
    width: 56px; height: 56px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color .15s;
  }
  .thumb-wrap:hover { border-color: var(--accent); }
  .thumb-wrap.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-num {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.65);
    font-size: 8px; color: var(--dim);
    text-align: center; padding: 1px 0; letter-spacing: .04em;
  }
  .thumb-wrap.selected .thumb-num { color: var(--accent); }

  /* ── Sidebar ── */
  .sidebar {
    grid-column: 2; grid-row: 1 / 3;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; overflow-x: hidden;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .section { border-bottom: 1px solid var(--border); padding: 14px 16px; }
  .section-title {
    font-size: 9px; letter-spacing: .15em;
    color: var(--dim); text-transform: uppercase; margin-bottom: 12px;
  }

  .control-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .control-label { font-size: 11px; color: var(--text); letter-spacing: .03em; }
  .control-label small { display: block; color: var(--dim); font-size: 9px; margin-top: 2px; }

  .num-input-wrap { display: flex; align-items: center; border: 1px solid var(--border); }
  .num-btn {
    background: none; border: none; color: var(--accent);
    width: 24px; height: 28px; cursor: pointer;
    font-family: var(--font); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .num-btn:hover { background: rgba(127,255,178,.1); }
  .num-display {
    background: rgba(0,0,0,.5); color: var(--accent);
    font-size: 11px; width: 46px; text-align: center;
    padding: 4px 2px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    font-family: var(--font);
  }
  .num-unit { font-size: 9px; color: var(--dim); margin-left: 4px; }

  .btn {
    width: 100%; padding: 9px 0;
    border: 1px solid var(--border);
    background: none; color: var(--text);
    font-family: var(--font); font-size: 11px;
    letter-spacing: .1em; cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
    text-transform: uppercase;
  }
  .btn:hover { background: rgba(255,255,255,.04); border-color: #2a2a3a; }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(127,255,178,.08); }
  .btn.primary.active { background: var(--accent); color: #0a0a0f; }
  .btn.warn { border-color: var(--accent2); color: var(--accent2); }
  .btn.warn:hover { background: rgba(255,127,80,.08); }
  .btn + .btn { margin-top: 6px; }
  .btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

  .log {
    min-height: 50px; max-height: 130px;
    overflow-y: auto; padding: 8px;
    background: rgba(0,0,0,.4); border: 1px solid var(--border);
    font-size: 9px; line-height: 1.75; color: var(--dim);
    display: flex; flex-direction: column-reverse;
  }
  .log::-webkit-scrollbar { width: 2px; }
  .log-entry { white-space: pre-wrap; word-break: break-all; }
  .log-entry.ok   { color: var(--accent); }
  .log-entry.err  { color: var(--accent2); }
  .log-entry.info { color: var(--accent3); }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; padding: 10px 16px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; color: var(--accent); display: block; font-weight: 700; }
  .stat-lbl { font-size: 8px; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; }

  /* progress overlay for ZIP */
  .zip-progress {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .zip-progress.show { display: flex; }
  .zip-box {
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 24px 32px;
    text-align: center; min-width: 200px;
  }
  .zip-box p { font-size: 11px; color: var(--accent); letter-spacing: .08em; margin-bottom: 12px; }
  .zip-bar-wrap { height: 3px; background: var(--border); }
  .zip-bar { height: 100%; background: var(--accent); width: 0%; transition: width .1s; }

  @media (max-width: 600px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: 50vw auto 1fr;
    }
    .cam-area  { grid-column: 1; grid-row: 1; }
    .gallery-area { grid-column: 1; grid-row: 2; }
    .sidebar { grid-column: 1; grid-row: 3; }
  }
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic t-red"></div>
  <div class="traffic t-yel"></div>
  <div class="traffic t-grn"></div>
  <span class="titlebar-title">FlashCam.html</span>
</div>

<div class="main">

  <!-- Camera -->
  <div class="cam-area">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-placeholder" id="placeholder">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <rect x="8" y="18" width="56" height="40" rx="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="36" cy="38" r="12" stroke="currentColor" stroke-width="2"/>
        <circle cx="36" cy="38" r="5" fill="currentColor" opacity=".35"/>
        <path d="M24 18l4-8h16l4 8" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="56" cy="26" r="3" fill="currentColor" opacity=".4"/>
      </svg>
      <span>START CAMERA</span>
    </div>
    <div class="cam-overlay" id="camOverlay"></div>
    <div class="flash-indicator" id="flashIndicator"></div>
    <div class="shutter-flash" id="shutterFlash"></div>
    <div class="flash-ring" id="flashRing"></div>
    <div class="cam-status" id="camStatus">OFFLINE</div>
  </div>

  <!-- Gallery strip -->
  <div class="gallery-area" id="galleryArea">
    <div class="gallery-empty" id="galleryEmpty">NO PHOTOS YET</div>
    <div class="gallery-scroll" id="galleryScroll" style="display:none"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="section">
      <div class="section-title">Camera</div>
      <button class="btn primary" id="btnCamera" onclick="toggleCamera()">&#9654; START CAMERA</button>
    </div>

    <div class="section">
      <div class="section-title">Flashlight</div>
      <div class="control-row">
        <div class="control-label">点滅間隔<small>blink interval</small></div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="num-input-wrap">
            <button class="num-btn" onclick="adj('flashInterval',-0.05)">-</button>
            <div class="num-display" id="flashInterval-display">0.5</div>
            <button class="num-btn" onclick="adj('flashInterval',0.05)">+</button>
          </div>
          <span class="num-unit">sec</span>
        </div>
      </div>
      <div class="control-row">
        <div class="control-label">点灯時間<small>on duration</small></div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="num-input-wrap">
            <button class="num-btn" onclick="adj('flashDuration',-0.01)">-</button>
            <div class="num-display" id="flashDuration-display">0.1</div>
            <button class="num-btn" onclick="adj('flashDuration',0.01)">+</button>
          </div>
          <span class="num-unit">sec</span>
        </div>
      </div>
      <button class="btn primary" id="btnFlash" onclick="toggleFlash()">&#9889; START FLASH</button>
    </div>

    <div class="section">
      <div class="section-title">Auto Capture</div>
      <div class="control-row">
        <div class="control-label">撮影間隔<small>capture interval</small></div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="num-input-wrap">
            <button class="num-btn" onclick="adj('photoInterval',-0.1)">-</button>
            <div class="num-display" id="photoInterval-display">5.0</div>
            <button class="num-btn" onclick="adj('photoInterval',0.1)">+</button>
          </div>
          <span class="num-unit">sec</span>
        </div>
      </div>
      <div class="control-row">
        <div class="control-label">最大枚数<small>max shots  0=unlimited</small></div>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="num-input-wrap">
            <button class="num-btn" onclick="adj('maxShots',-1)">-</button>
            <div class="num-display" id="maxShots-display"> 0</div>
            <button class="num-btn" onclick="adj('maxShots',1)">+</button>
          </div>
          <span class="num-unit">pcs</span>
        </div>
      </div>
      <button class="btn primary" id="btnPhoto" onclick="togglePhoto()">&#9711; START CAPTURE</button>
      <button class="btn" onclick="snapNow()" style="margin-top:6px">SNAP NOW</button>
    </div>

    <!-- Download -->
    <div class="section">
      <div class="section-title">Download</div>
      <button class="btn primary" id="btnDlAll" onclick="downloadAll()" disabled>&#8659; DOWNLOAD ALL (ZIP)</button>
      <button class="btn" id="btnDlSel" onclick="downloadSelected()" style="margin-top:6px" disabled>&#8659; DOWNLOAD SELECTED</button>
      <button class="btn warn" id="btnClear" onclick="clearPhotos()" style="margin-top:6px" disabled>&#10005; CLEAR ALL</button>
    </div>

    <!-- Log -->
    <div class="section" style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div class="section-title">Log</div>
      <div class="log" id="log"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-val" id="statFlash">0</span>
        <span class="stat-lbl">Flashes</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="statPhoto">0</span>
        <span class="stat-lbl">Photos</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="statTime">--</span>
        <span class="stat-lbl">Uptime</span>
      </div>
    </div>

  </div>
</div>

<!-- ZIP progress -->
<div class="zip-progress" id="zipProgress">
  <div class="zip-box">
    <p id="zipMsg">BUILDING ZIP...</p>
    <div class="zip-bar-wrap"><div class="zip-bar" id="zipBar"></div></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────
const S = {
  flashInterval: 0.5,
  flashDuration: 0.1,
  photoInterval: 5.0,
  maxShots: 0,
};
const bounds = {
  flashInterval: [0.05, 120],
  flashDuration: [0.01, 10],
  photoInterval: [0.1, 3600],
  maxShots: [0, 9999],
};

// ── State ───────────────────────────────────────
let stream = null, track = null, hasTorch = false;
let flashTimer = null, flashOffTimer = null, photoTimer = null;
let flashCount = 0, photoCount = 0;
let startTime = null, uptimeTimer = null;
let cameraActive = false, flashActive = false, photoActive = false;

// photo store: [{blob, filename, url, selected}]
const photos = [];
let selectedIndex = -1;

// ── Logger ──────────────────────────────────────
function log(msg, type = 'ok') {
  const el = document.getElementById('log');
  const now = new Date().toTimeString().slice(0, 8);
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = '[' + now + '] ' + msg;
  el.prepend(div);
  if (el.children.length > 120) el.lastChild.remove();
}

// ── Number controls ──────────────────────────────
function adj(key, delta) {
  const dec = Math.max(
    (S[key].toString().split('.')[1] || '').length,
    (Math.abs(delta).toString().split('.')[1] || '').length
  );
  let v = parseFloat((S[key] + delta).toFixed(dec));
  const [mn, mx] = bounds[key];
  v = Math.max(mn, Math.min(mx, v));
  S[key] = v;
  let disp;
  if (key === 'maxShots') {
    disp = String(v).padStart(2, ' ');
  } else {
    const d = v < 0.1 ? 2 : v < 1 ? 1 : (Number.isInteger(v) ? 1 : 1);
    disp = v.toFixed(1);
  }
  document.getElementById(key + '-display').textContent = disp;
}

// ── Camera ──────────────────────────────────────
async function toggleCamera() {
  cameraActive ? stopCamera() : await startCamera();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('camOverlay').style.display = 'block';

    track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    hasTorch = !!(caps && caps.torch);
    cameraActive = true;
    startTime = Date.now();
    uptimeTimer = setInterval(updateUptime, 1000);

    document.getElementById('btnCamera').textContent = '| STOP CAMERA';
    document.getElementById('btnCamera').classList.add('active');
    const st = document.getElementById('camStatus');
    st.textContent = hasTorch ? 'TORCH READY' : 'NO TORCH API';
    st.className = 'cam-status live';
    log('Camera started  torch:' + (hasTorch ? 'yes' : 'no'), 'ok');
    if (!hasTorch) log('Torch API unavailable on this device/browser', 'err');
  } catch(e) {
    log('Camera error: ' + e.message, 'err');
  }
}

function stopCamera() {
  stopFlash(); stopPhoto();
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; track = null;
  const video = document.getElementById('video');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('camOverlay').style.display = 'none';
  clearInterval(uptimeTimer); uptimeTimer = null;
  cameraActive = false;
  document.getElementById('btnCamera').innerHTML = '&#9654; START CAMERA';
  document.getElementById('btnCamera').classList.remove('active');
  document.getElementById('camStatus').textContent = 'OFFLINE';
  document.getElementById('camStatus').className = 'cam-status';
  document.getElementById('statTime').textContent = '--';
  log('Camera stopped', 'info');
}

function updateUptime() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + ss;
}

// ── Flash ────────────────────────────────────────
function toggleFlash() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  flashActive ? stopFlash() : startFlash();
}
function startFlash() {
  flashActive = true;
  document.getElementById('btnFlash').textContent = '| STOP FLASH';
  document.getElementById('btnFlash').classList.add('active');
  log('Flash start  interval:' + S.flashInterval + 's  on:' + S.flashDuration + 's', 'ok');
  doFlash();
}
function doFlash() {
  if (!flashActive) return;
  flashTimer = setTimeout(() => { triggerFlash(); doFlash(); }, S.flashInterval * 1000);
}
async function triggerFlash() {
  flashCount++;
  document.getElementById('statFlash').textContent = flashCount;
  const ind = document.getElementById('flashIndicator');
  ind.classList.add('on');
  const ring = document.getElementById('flashRing');
  ring.classList.remove('pulse'); void ring.offsetWidth; ring.classList.add('pulse');
  if (hasTorch && track) {
    try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}
  }
  flashOffTimer = setTimeout(async () => {
    ind.classList.remove('on');
    if (hasTorch && track) {
      try { await track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
    }
  }, S.flashDuration * 1000);
}
function stopFlash() {
  flashActive = false;
  clearTimeout(flashTimer); clearTimeout(flashOffTimer);
  if (hasTorch && track) track.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
  document.getElementById('flashIndicator').classList.remove('on');
  document.getElementById('btnFlash').innerHTML = '&#9889; START FLASH';
  document.getElementById('btnFlash').classList.remove('active');
  log('Flash stopped', 'info');
}

// ── Photo capture ────────────────────────────────
function togglePhoto() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  photoActive ? stopPhoto() : startPhoto();
}
function startPhoto() {
  photoActive = true;
  document.getElementById('btnPhoto').textContent = '| STOP CAPTURE';
  document.getElementById('btnPhoto').classList.add('active');
  const limit = S.maxShots > 0 ? 'max ' + S.maxShots : 'unlimited';
  log('Auto capture start  every ' + S.photoInterval + 's  ' + limit, 'ok');
  schedulePhoto();
}
function schedulePhoto() {
  if (!photoActive) return;
  photoTimer = setTimeout(() => {
    if (!photoActive) return;
    snapNow();
    if (S.maxShots > 0 && photoCount >= S.maxShots) {
      stopPhoto();
      log('Reached max ' + S.maxShots + ' shots', 'info');
      return;
    }
    schedulePhoto();
  }, S.photoInterval * 1000);
}
function stopPhoto() {
  photoActive = false;
  clearTimeout(photoTimer);
  document.getElementById('btnPhoto').innerHTML = '&#9711; START CAPTURE';
  document.getElementById('btnPhoto').classList.remove('active');
  log('Auto capture stopped', 'info');
}

function shutterEffect() {
  const sf = document.getElementById('shutterFlash');
  sf.classList.remove('snap'); void sf.offsetWidth; sf.classList.add('snap');
}

async function snapNow() {
  if (!cameraActive) { log('Start camera first', 'err'); return; }
  shutterEffect();
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = 'photo_' + ts + '.jpg';

  if (window.ImageCapture && track) {
    try {
      const ic = new ImageCapture(track);
      const blob = await ic.takePhoto();
      addPhoto(blob, filename);
      return;
    } catch(e) {
      log('ImageCapture fallback to canvas', 'info');
    }
  }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width  = video.videoWidth  || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => addPhoto(blob, filename), 'image/jpeg', 0.93);
}

// ── Gallery / store ──────────────────────────────
function addPhoto(blob, filename) {
  const url = URL.createObjectURL(blob);
  const idx = photos.length;
  photos.push({ blob, filename, url, selected: false });
  photoCount++;
  document.getElementById('statPhoto').textContent = photoCount;
  log('Captured #' + photoCount + '  ' + filename, 'ok');

  // show gallery
  document.getElementById('galleryEmpty').style.display = 'none';
  const scroll = document.getElementById('galleryScroll');
  scroll.style.display = 'flex';

  const wrap = document.createElement('div');
  wrap.className = 'thumb-wrap';
  wrap.dataset.idx = idx;
  wrap.onclick = () => selectThumb(idx);

  const img = document.createElement('img');
  img.src = url;
  img.alt = filename;

  const num = document.createElement('div');
  num.className = 'thumb-num';
  num.textContent = '#' + photoCount;

  wrap.appendChild(img);
  wrap.appendChild(num);
  scroll.appendChild(wrap);
  scroll.scrollLeft = scroll.scrollWidth;

  updateDlButtons();
}

function selectThumb(idx) {
  // toggle selection
  const wasSelected = photos[idx].selected;
  photos[idx].selected = !wasSelected;
  selectedIndex = photos[idx].selected ? idx : -1;

  const thumbs = document.querySelectorAll('.thumb-wrap');
  thumbs.forEach(t => {
    const i = parseInt(t.dataset.idx);
    t.classList.toggle('selected', photos[i].selected);
  });
  updateDlButtons();
}

function updateDlButtons() {
  const hasPhotos = photos.length > 0;
  const hasSel = photos.some(p => p.selected);
  document.getElementById('btnDlAll').disabled  = !hasPhotos;
  document.getElementById('btnDlSel').disabled  = !hasSel;
  document.getElementById('btnClear').disabled  = !hasPhotos;
}

// ── Download ─────────────────────────────────────
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadSelected() {
  const sel = photos.filter(p => p.selected);
  if (!sel.length) return;
  if (sel.length === 1) {
    downloadBlob(sel[0].blob, sel[0].filename);
    log('Downloaded: ' + sel[0].filename, 'ok');
    return;
  }
  buildZip(sel, 'flashcam_selected.zip');
}

async function downloadAll() {
  if (!photos.length) return;
  if (photos.length === 1) {
    downloadBlob(photos[0].blob, photos[0].filename);
    log('Downloaded: ' + photos[0].filename, 'ok');
    return;
  }
  buildZip(photos, 'flashcam_all.zip');
}

async function buildZip(list, zipName) {
  const prog = document.getElementById('zipProgress');
  const bar  = document.getElementById('zipBar');
  const msg  = document.getElementById('zipMsg');
  prog.classList.add('show');
  bar.style.width = '0%';
  msg.textContent = 'BUILDING ZIP... 0/' + list.length;

  try {
    const zip = new JSZip();
    for (let i = 0; i < list.length; i++) {
      zip.file(list[i].filename, list[i].blob);
      const pct = Math.round(((i + 1) / list.length) * 60);
      bar.style.width = pct + '%';
      msg.textContent = 'BUILDING ZIP... ' + (i + 1) + '/' + list.length;
      await new Promise(r => setTimeout(r, 0)); // yield
    }
    msg.textContent = 'COMPRESSING...';
    const zipBlob = await zip.generateAsync(
      { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 3 } },
      meta => { bar.style.width = 60 + Math.round(meta.percent * 0.4) + '%'; }
    );
    bar.style.width = '100%';
    msg.textContent = 'DONE!';
    await new Promise(r => setTimeout(r, 400));
    downloadBlob(zipBlob, zipName);
    log('ZIP downloaded: ' + zipName + ' (' + list.length + ' photos)', 'ok');
  } catch(e) {
    log('ZIP error: ' + e.message, 'err');
  } finally {
    prog.classList.remove('show');
  }
}

function clearPhotos() {
  photos.forEach(p => URL.revokeObjectURL(p.url));
  photos.length = 0;
  photoCount = 0;
  selectedIndex = -1;
  document.getElementById('statPhoto').textContent = '0';
  document.getElementById('galleryScroll').innerHTML = '';
  document.getElementById('galleryScroll').style.display = 'none';
  document.getElementById('galleryEmpty').style.display = 'block';
  updateDlButtons();
  log('All photos cleared', 'info');
}

log('FlashCam ready', 'info');
</script>
